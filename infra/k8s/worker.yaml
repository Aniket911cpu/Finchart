apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: finchart
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/aniket911cpu/finchart-worker:latest
          envFrom:
            - secretRef: { name: finchart-secrets }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          # Workers don't expose ports — they process BullMQ jobs
