# finchart-secrets.yaml
# ⚠️  DO NOT COMMIT REAL VALUES — Use `kubectl create secret` or Vault in production
# Template: fill values and apply with `kubectl apply -f secrets.yaml -n finchart`
apiVersion: v1
kind: Secret
metadata:
  name: finchart-secrets
  namespace: finchart
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://admin:CHANGE_ME@postgres:5432/finchart?schema=public"
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "CHANGE_ME"

  # Auth
  JWT_SECRET: "CHANGE_ME_TO_LONG_RANDOM_STRING"
  NEXTAUTH_SECRET: "CHANGE_ME_TO_LONG_RANDOM_STRING"

  # Redis
  REDIS_URL: "redis://redis:6379"

  # External APIs
  OPENAI_API_KEY: ""
  BINANCE_API_KEY: ""
  POLYGON_API_KEY: ""
  TWELVEDATA_API_KEY: ""
  SENDGRID_API_KEY: ""

  # Storage
  S3_BUCKET: ""
  S3_REGION: "ap-south-1"
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
