apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: finchart
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: ghcr.io/aniket911cpu/finchart-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXTAUTH_URL
              value: "https://app.finchart.pro"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.finchart.pro"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://ws.finchart.pro"
          envFrom:
            - secretRef: { name: finchart-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: finchart
spec:
  selector: { app: web }
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: finchart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
