apiVersion: v1
kind: Namespace
metadata:
  name: finchart
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: finchart
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/aniket911cpu/finchart-api:latest
          ports: [{ containerPort: 3001 }]
          envFrom:
            - secretRef: { name: finchart-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: finchart
spec:
  selector: { app: api }
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: finchart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
