worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Logging ───────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ─── Performance ───────────────────────────────────────────────────────
  sendfile          on;
  tcp_nopush        on;
  tcp_nodelay       on;
  keepalive_timeout 65;
  gzip              on;
  gzip_types        text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length   1024;

  # ─── Security Headers ──────────────────────────────────────────────────
  add_header X-Frame-Options          "DENY"                          always;
  add_header X-Content-Type-Options   "nosniff"                       always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection         "1; mode=block"                 always;

  # ─── Rate Limiting ─────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/m;
  limit_req_zone $binary_remote_addr zone=ws_limit:10m     rate=10r/m;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/m;

  # ─── Upstreams ─────────────────────────────────────────────────────────
  upstream web_upstream {
    least_conn;
    server web:3000;
    keepalive 32;
  }

  upstream api_upstream {
    least_conn;
    server api:3001;
    keepalive 32;
  }

  upstream ws_upstream {
    least_conn;
    server ws-gateway:3002;
    keepalive 64;
  }

  # ─── HTTP → HTTPS Redirect ─────────────────────────────────────────────
  server {
    listen 80;
    server_name app.finchart.pro api.finchart.pro ws.finchart.pro;
    return 301 https://$host$request_uri;
  }

  # ─── Web App ───────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name app.finchart.pro;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ─── REST API ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.finchart.pro;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.3;

    location /auth/ {
      limit_req   zone=auth_limit burst=10 nodelay;
      proxy_pass  http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      limit_req   zone=api_limit burst=50 nodelay;
      proxy_pass  http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # ─── WebSocket Gateway ─────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name ws.finchart.pro;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.3;

    location / {
      limit_req zone=ws_limit burst=5 nodelay;

      proxy_pass          http://ws_upstream;
      proxy_http_version  1.1;

      # WebSocket upgrade headers — critical
      proxy_set_header    Upgrade           $http_upgrade;
      proxy_set_header    Connection        "upgrade";
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;

      # Long timeout for persistent WS connections
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }
  }
}
