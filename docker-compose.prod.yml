version: '3.9'

services:
  # ─── Infrastructure ────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpassword}
      POSTGRES_DB: finchart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d finchart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [finchart]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [finchart]

  # ─── Applications ──────────────────────────────────────────────────────
  api:
    image: ghcr.io/aniket911cpu/finchart-api:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finchart?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [finchart]
    deploy:
      replicas: 2
      restart_policy: { condition: on-failure }

  ws-gateway:
    image: ghcr.io/aniket911cpu/finchart-ws-gateway:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      redis: { condition: service_healthy }
    networks: [finchart]
    deploy:
      replicas: 2

  worker:
    image: ghcr.io/aniket911cpu/finchart-worker:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finchart?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [finchart]

  web:
    image: ghcr.io/aniket911cpu/finchart-web:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.finchart.pro}
      NEXTAUTH_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.finchart.pro}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-wss://ws.finchart.pro}
    networks: [finchart]

  # ─── Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on: [web, api, ws-gateway]
    networks: [finchart]

volumes:
  postgres_data:
  redis_data:

networks:
  finchart:
    driver: bridge
